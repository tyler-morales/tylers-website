    <script>
        (function () {
            try {
                var storedTheme = localStorage.getItem("theme");
                var systemDark = window.matchMedia &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches;
                var theme = storedTheme === "light" || storedTheme === "dark"
                    ? storedTheme
                    : (systemDark ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", theme);
            } catch (error) { }
        })();
    </script>
    <script>
        (function () {
            try {
                var reducedMotion = window.matchMedia &&
                    window.matchMedia("(prefers-reduced-motion: reduce)").matches;
                if (reducedMotion) {
                    sessionStorage.removeItem("vt-intent");
                    sessionStorage.removeItem("vt-name");
                    return;
                }

                var intent = sessionStorage.getItem("vt-intent");
                var name = sessionStorage.getItem("vt-name");
                var path = window.location.pathname || "";
                var isProjectDetail = path.indexOf("/projects/") === 0 && path !== "/projects/";

                if (intent === "project-image" && name && isProjectDetail) {
                    document.documentElement.classList.add("vt-project-image");
                    window.addEventListener("pagereveal", function (event) {
                        if (!event.viewTransition) {
                            return;
                        }
                        var selector = '.project-cover-image[data-view-transition-name="' + name + '"]';
                        var image = document.querySelector(selector);
                        if (!image) {
                            return;
                        }
                        var timeout = new Promise(function (resolve) {
                            setTimeout(resolve, 120);
                        });
                        var decoded = image.decode ? image.decode().catch(function () { }) : Promise.resolve();
                        Promise.race([decoded, timeout]).then(function () { });
                    }, { once: true });
                } else {
                    sessionStorage.removeItem("vt-intent");
                    sessionStorage.removeItem("vt-name");
                }
            } catch (error) { }
        })();
    </script>

        <script>
            (function () {
                var container = document.getElementById("mood-container");
                var link = document.getElementById("mood-link");
                var emoji = document.getElementById("mood-emoji");
                var status = document.getElementById("mood-status");
                if (!container || !emoji || !status || !link) {
                    return;
                }
                var relativeText = "";
                var absoluteText = "";
                var isAbsolute = false;

                function formatAbsolute(timestamp) {
                    var date = new Date(timestamp);
                    return date.toLocaleString(undefined, {
                        year: "numeric",
                        month: "short",
                        day: "numeric",
                        hour: "numeric",
                        minute: "2-digit"
                    });
                }

                function timeAgo(ms) {
                    var seconds = Math.floor(ms / 1000);
                    if (seconds < 60) {
                        return "just now";
                    }
                    var minutes = Math.floor(seconds / 60);
                    if (minutes < 60) {
                        return minutes === 1 ? "1 minute ago" : minutes + " minutes ago";
                    }
                    var hours = Math.floor(minutes / 60);
                    if (hours < 24) {
                        return hours === 1 ? "1 hour ago" : hours + " hours ago";
                    }
                    var days = Math.floor(hours / 24);
                    return days === 1 ? "1 day ago" : days + " days ago";
                }

                function pickEmoji(ageMs) {
                    var day = 24 * 60 * 60 * 1000;
                    if (ageMs < day) {
                        return "✨";
                    }
                    if (ageMs < 7 * day) {
                        return "🙂";
                    }
                    if (ageMs < 30 * day) {
                        return "😴";
                    }
                    return "💀";
                }

                function setState(timestamp) {
                    var parsed = typeof timestamp === "number" ? timestamp : NaN;
                    if (Number.isNaN(parsed)) {
                        container.title = "Last edit time unavailable";
                        relativeText = "Last edit time unavailable";
                        absoluteText = "Last edit time unavailable";
                        status.textContent = relativeText;
                        status.setAttribute("aria-pressed", "false");
                        link.setAttribute("aria-label", "Open latest update. Last edit time unavailable.");
                        container.classList.add("is-stale");
                        return;
                    }

                    var now = Date.now();
                    var ageMs = Math.max(0, now - parsed);
                    emoji.textContent = pickEmoji(ageMs);
                    var isFresh = ageMs < 24 * 60 * 60 * 1000;
                    var isPulsing = ageMs < 60 * 60 * 1000;

                    container.classList.toggle("is-fresh", isFresh);
                    container.classList.toggle("is-stale", !isFresh);
                    container.classList.toggle("is-pulsing", isPulsing);
                    relativeText = "Last edit was " + timeAgo(ageMs);
                    absoluteText = "Last edit was " + formatAbsolute(parsed);
                    status.textContent = relativeText;
                    status.setAttribute("aria-pressed", "false");
                    container.title = relativeText;
                    link.setAttribute("aria-label", "Open latest update. Last edit was " + timeAgo(ageMs) + ".");
                }

                var lastmodRaw = container.getAttribute("data-lastmod");
                var lastmod = lastmodRaw ? Date.parse(lastmodRaw) : NaN;
                setState(lastmod);

                status.addEventListener("click", function (event) {
                    event.preventDefault();
                    isAbsolute = !isAbsolute;
                    status.textContent = isAbsolute ? absoluteText : relativeText;
                    status.setAttribute("aria-pressed", isAbsolute ? "true" : "false");
                });

                status.addEventListener("keydown", function (event) {
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        isAbsolute = !isAbsolute;
                        status.textContent = isAbsolute ? absoluteText : relativeText;
                        status.setAttribute("aria-pressed", isAbsolute ? "true" : "false");
                    }
                });
            })();
        </script>
