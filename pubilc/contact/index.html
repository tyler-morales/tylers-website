    <script>
        (function () {
            try {
                var storedTheme = localStorage.getItem("theme");
                var systemDark = window.matchMedia &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches;
                var theme = storedTheme === "light" || storedTheme === "dark"
                    ? storedTheme
                    : (systemDark ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", theme);
            } catch (error) { }
        })();
    </script>
    <script>
        (function () {
            try {
                var reducedMotion = window.matchMedia &&
                    window.matchMedia("(prefers-reduced-motion: reduce)").matches;
                if (reducedMotion) {
                    sessionStorage.removeItem("vt-intent");
                    sessionStorage.removeItem("vt-name");
                    return;
                }

                var intent = sessionStorage.getItem("vt-intent");
                var name = sessionStorage.getItem("vt-name");
                var path = window.location.pathname || "";
                var isProjectDetail = path.indexOf("/projects/") === 0 && path !== "/projects/";

                if (intent === "project-image" && name && isProjectDetail) {
                    document.documentElement.classList.add("vt-project-image");
                    window.addEventListener("pagereveal", function (event) {
                        if (!event.viewTransition) {
                            return;
                        }
                        var selector = '.project-cover-image[data-view-transition-name="' + name + '"]';
                        var image = document.querySelector(selector);
                        if (!image) {
                            return;
                        }
                        var timeout = new Promise(function (resolve) {
                            setTimeout(resolve, 120);
                        });
                        var decoded = image.decode ? image.decode().catch(function () { }) : Promise.resolve();
                        Promise.race([decoded, timeout]).then(function () { });
                    }, { once: true });
                } else {
                    sessionStorage.removeItem("vt-intent");
                    sessionStorage.removeItem("vt-name");
                }
            } catch (error) { }
        })();
    </script>

<h1>Contact</h1>

<section class="contact-email">
    <p class="contact-email__line">
        <button type="button" class="contact-email__button" id="contact-email-button"
            aria-label="Copy email address to clipboard">
            tyler [at] tylermorales [dot] pro
        </button>
        <span class="contact-email__label" aria-hidden="true">
            <span class="contact-email__label-text contact-email__label-text--default">email:</span>
            <span class="contact-email__label-text contact-email__label-text--hover">copy:</span>
            <span class="contact-email__label-text contact-email__label-text--copied">copied:</span>
        </span>
    </p>
</section>

<script>
    (() => {
        const button = document.getElementById("contact-email-button");
        let lastPointerType = "mouse";
        let activeCleanup = null;
        let isActive = false;
        let activePointerId = null;
        let anchorOffsetX = 0;
        let anchorOffsetY = 0;
        let lastPointerX = window.innerWidth / 2;
        let lastPointerY = window.innerHeight / 2;
        let resetTimeout;
        const contactSection = button.closest(".contact-email");

        if (!button) {
            return;
        }

        const buildEmail = () => {
            const user = "tyler";
            const domain = "tylermorales";
            const tld = "pro";
            return `${user}@${domain}.${tld}`;
        };

        const isTouchDevice = () =>
            window.matchMedia("(pointer: coarse)").matches ||
            "ontouchstart" in window ||
            navigator.maxTouchPoints > 0;

        const prefersReducedMotion = () =>
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const fallbackCopy = (email) => {
            const textarea = document.createElement("textarea");
            textarea.value = email;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "absolute";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand("copy");
            } catch (error) {
                console.error("Email copy failed", error);
            }
            document.body.removeChild(textarea);
        };

        const copyToClipboard = async (email) => {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(email);
                } else {
                    fallbackCopy(email);
                }
            } catch (error) {
                fallbackCopy(email);
            }
        };

        const setGhostState = (isGhost) => {
            button.classList.toggle("contact-email__button--ghost", isGhost);
        };

        const setCopiedState = (isCopied) => {
            if (!contactSection) {
                return;
            }
            contactSection.classList.toggle("contact-email--copied", isCopied);
        };

        const setActiveState = (isAnimating) => {
            if (!contactSection) {
                return;
            }
            contactSection.classList.toggle("contact-email--active", isAnimating);
        };

        const startCursorFollowAnimation = (text, pointerId, offsetX, offsetY) => {
            const overlayId = "contact-email-follower-layer";
            let overlay = document.getElementById(overlayId);
            if (!overlay) {
                overlay = document.createElement("div");
                overlay.id = overlayId;
                overlay.className = "contact-email-follower-layer";
                document.body.appendChild(overlay);
            }

            const follower = document.createElement("span");
            follower.className = "contact-email-follower";
            follower.textContent = text;
            overlay.appendChild(follower);

            const updatePosition = (x, y) => {
                const translateX = x - offsetX + 20;
                const translateY = y - offsetY - 10;
                follower.style.transform = `translate3d(${translateX}px, ${translateY}px, 0)`;
            };

            const handlePointerMove = (event) => {
                if (pointerId !== null && event.pointerId !== pointerId) {
                    return;
                }
                lastPointerX = event.clientX;
                lastPointerY = event.clientY;
                updatePosition(event.clientX, event.clientY);
            };

            updatePosition(lastPointerX, lastPointerY);
            window.addEventListener("pointermove", handlePointerMove);

            return () => {
                window.removeEventListener("pointermove", handlePointerMove);
                follower.remove();
            };
        };

        const resetInteraction = () => {
            if (!isActive) {
                return;
            }
            window.clearTimeout(resetTimeout);
            setGhostState(false);
            setCopiedState(false);
            setActiveState(false);
            if (activeCleanup) {
                activeCleanup();
                activeCleanup = null;
            }
            isActive = false;
            activePointerId = null;
            removeGlobalResetListeners();
        };

        const onGlobalPointerDown = (event) => {
            if (event.target === button || button.contains(event.target)) {
                return;
            }
            resetInteraction();
        };

        const onGlobalKeydown = () => {
            resetInteraction();
        };

        const onGlobalWheel = () => {
            resetInteraction();
        };

        const onGlobalTouchStart = () => {
            resetInteraction();
        };

        const onVisibilityChange = () => {
            if (document.hidden) {
                resetInteraction();
            }
        };

        const addGlobalResetListeners = () => {
            window.addEventListener("pointerdown", onGlobalPointerDown);
            window.addEventListener("keydown", onGlobalKeydown);
            window.addEventListener("wheel", onGlobalWheel, { passive: true });
            window.addEventListener("scroll", onGlobalWheel, { passive: true });
            window.addEventListener("touchstart", onGlobalTouchStart, { passive: true });
            window.addEventListener("blur", resetInteraction);
            document.addEventListener("visibilitychange", onVisibilityChange);
        };

        const removeGlobalResetListeners = () => {
            window.removeEventListener("pointerdown", onGlobalPointerDown);
            window.removeEventListener("keydown", onGlobalKeydown);
            window.removeEventListener("wheel", onGlobalWheel);
            window.removeEventListener("scroll", onGlobalWheel);
            window.removeEventListener("touchstart", onGlobalTouchStart);
            window.removeEventListener("blur", resetInteraction);
            document.removeEventListener("visibilitychange", onVisibilityChange);
        };

        button.addEventListener("pointerdown", (event) => {
            lastPointerType = event.pointerType || "mouse";
            if (event.pointerType === "mouse") {
                const rect = button.getBoundingClientRect();
                anchorOffsetX = event.clientX - rect.left;
                anchorOffsetY = event.clientY - rect.top;
                lastPointerX = event.clientX;
                lastPointerY = event.clientY;
                activePointerId = event.pointerId ?? null;
            }
        });

        const handleCopy = async (event) => {
            const email = buildEmail();
            const obfuscatedText = button.textContent.trim();
            const reduceMotion = prefersReducedMotion();
            const isTouch = isTouchDevice();
            const isKeyboard = event.detail === 0;
            const shouldFollow = !reduceMotion && !isTouch && !isKeyboard && lastPointerType === "mouse";
            const durationMs = 3000;

            resetInteraction();
            isActive = true;
            setGhostState(true);
            setCopiedState(true);
            setActiveState(true);
            addGlobalResetListeners();

            await copyToClipboard(email);

            if (shouldFollow) {
                activeCleanup = startCursorFollowAnimation(
                    obfuscatedText,
                    activePointerId,
                    anchorOffsetX,
                    anchorOffsetY
                );
                resetTimeout = window.setTimeout(() => {
                    resetInteraction();
                }, durationMs);
            }
        };

        button.addEventListener("click", handleCopy);
    })();
</script>

        <script>
            (function () {
                var container = document.getElementById("mood-container");
                var link = document.getElementById("mood-link");
                var emoji = document.getElementById("mood-emoji");
                var status = document.getElementById("mood-status");
                if (!container || !emoji || !status || !link) {
                    return;
                }
                var relativeText = "";
                var absoluteText = "";
                var isAbsolute = false;

                function formatAbsolute(timestamp) {
                    var date = new Date(timestamp);
                    return date.toLocaleString(undefined, {
                        year: "numeric",
                        month: "short",
                        day: "numeric",
                        hour: "numeric",
                        minute: "2-digit"
                    });
                }

                function timeAgo(ms) {
                    var seconds = Math.floor(ms / 1000);
                    if (seconds < 60) {
                        return "just now";
                    }
                    var minutes = Math.floor(seconds / 60);
                    if (minutes < 60) {
                        return minutes === 1 ? "1 minute ago" : minutes + " minutes ago";
                    }
                    var hours = Math.floor(minutes / 60);
                    if (hours < 24) {
                        return hours === 1 ? "1 hour ago" : hours + " hours ago";
                    }
                    var days = Math.floor(hours / 24);
                    return days === 1 ? "1 day ago" : days + " days ago";
                }

                function pickEmoji(ageMs) {
                    var day = 24 * 60 * 60 * 1000;
                    if (ageMs < day) {
                        return "✨";
                    }
                    if (ageMs < 7 * day) {
                        return "🙂";
                    }
                    if (ageMs < 30 * day) {
                        return "😴";
                    }
                    return "💀";
                }

                function setState(timestamp) {
                    var parsed = typeof timestamp === "number" ? timestamp : NaN;
                    if (Number.isNaN(parsed)) {
                        container.title = "Last edit time unavailable";
                        relativeText = "Last edit time unavailable";
                        absoluteText = "Last edit time unavailable";
                        status.textContent = relativeText;
                        status.setAttribute("aria-pressed", "false");
                        link.setAttribute("aria-label", "Open latest update. Last edit time unavailable.");
                        container.classList.add("is-stale");
                        return;
                    }

                    var now = Date.now();
                    var ageMs = Math.max(0, now - parsed);
                    emoji.textContent = pickEmoji(ageMs);
                    var isFresh = ageMs < 24 * 60 * 60 * 1000;
                    var isPulsing = ageMs < 60 * 60 * 1000;

                    container.classList.toggle("is-fresh", isFresh);
                    container.classList.toggle("is-stale", !isFresh);
                    container.classList.toggle("is-pulsing", isPulsing);
                    relativeText = "Last edit was " + timeAgo(ageMs);
                    absoluteText = "Last edit was " + formatAbsolute(parsed);
                    status.textContent = relativeText;
                    status.setAttribute("aria-pressed", "false");
                    container.title = relativeText;
                    link.setAttribute("aria-label", "Open latest update. Last edit was " + timeAgo(ageMs) + ".");
                }

                var lastmodRaw = container.getAttribute("data-lastmod");
                var lastmod = lastmodRaw ? Date.parse(lastmodRaw) : NaN;
                setState(lastmod);

                status.addEventListener("click", function (event) {
                    event.preventDefault();
                    isAbsolute = !isAbsolute;
                    status.textContent = isAbsolute ? absoluteText : relativeText;
                    status.setAttribute("aria-pressed", isAbsolute ? "true" : "false");
                });

                status.addEventListener("keydown", function (event) {
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        isAbsolute = !isAbsolute;
                        status.textContent = isAbsolute ? absoluteText : relativeText;
                        status.setAttribute("aria-pressed", isAbsolute ? "true" : "false");
                    }
                });
            })();
        </script>
