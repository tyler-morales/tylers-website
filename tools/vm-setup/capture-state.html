<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>v86 — capture state snapshot (dev)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 56rem;
      margin: 1rem auto;
      padding: 0 1rem;
    }

    #screen {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 4 / 3;
      margin: 1rem 0;
      background: #000;
      border: 3px solid #333;
    }

    #screen canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin: 0.5rem 0;
    }

    button {
      padding: 0.5rem 1rem;
      font: inherit;
      cursor: pointer;
    }

    button:focus-visible {
      outline: 3px solid #06c;
      outline-offset: 2px;
    }

    #status {
      min-height: 1.5rem;
    }

    code {
      font-size: 0.95em;
    }
  </style>
</head>

<body>
  <h1>Capture <code>game_ready.state</code></h1>
  <p>Serve this folder over HTTP (not <code>file://</code>), e.g.
    <code>cd tools/vm-setup &amp;&amp; python3 -m http.server 8765</code> then open
    <code>http://127.0.0.1:8765/capture-state.html</code>. Place BIOS, <code>winxp-lite.img</code>, and
    <code>magneto_fixed01.iso</code> under <code>images/</code>.
  </p>

  <div class="row">
    <button type="button" id="start">Start emulator</button>
    <button type="button" id="save" disabled>Download state snapshot</button>
  </div>
  <p id="status" role="status" aria-live="polite"></p>
  <div id="screen" aria-label="Emulated PC display"></div>

  <script src="https://cdn.jsdelivr.net/npm/v86@0.5.319/build/libv86.js"></script>
  <script>
    (function () {
      "use strict";
      var WASM = "https://cdn.jsdelivr.net/npm/v86@0.5.319/build/v86.wasm";
      var emulator = null;
      var start = document.getElementById("start");
      var save = document.getElementById("save");
      var statusEl = document.getElementById("status");
      var screenEl = document.getElementById("screen");

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      start.addEventListener("click", function () {
        if (emulator) {
          return;
        }
        if (typeof window.V86 !== "function") {
          setStatus("v86 did not load (window.V86 missing).");
          return;
        }
        start.disabled = true;
        setStatus("Loading…");
        try {
          emulator = new window.V86({
            wasm_path: WASM,
            memory_size: 256 * 1024 * 1024,
            vga_memory_size: 8 * 1024 * 1024,
            screen_container: screenEl,
            bios: { url: "./images/seabios.bin" },
            vga_bios: { url: "./images/vgabios.bin" },
            hda: { url: "./images/winxp-lite.img", async: true },
            cdrom: { url: "./images/magneto_fixed01.iso", async: true },
            autostart: true,
          });
        } catch (err) {
          setStatus(String(err && err.message ? err.message : err));
          start.disabled = false;
          return;
        }

        emulator.add_listener("download-progress", function (e) {
          var pct = 0;
          if (e && e.lengthComputable && e.total > 0) {
            pct = Math.min(100, Math.round((100 * e.loaded) / e.total));
          }
          var name = (e && e.file_name) ? String(e.file_name).split("/").pop() : "file";
          setStatus("Downloading " + name + " — " + pct + "%");
        });

        emulator.add_listener("emulator-loaded", function () {
          save.disabled = false;
          screenEl.setAttribute("tabindex", "0");
          screenEl.setAttribute("role", "application");
          try {
            screenEl.focus({ preventScroll: true });
          } catch (e2) {
            screenEl.focus();
          }
          setStatus("Emulator ready. Boot to the game title screen, then download the state snapshot.");
        });

        emulator.add_listener("download-error", function (p) {
          var n = p && p.file_name ? p.file_name : "asset";
          setStatus("Could not load " + n + ". Check paths and that this page is served over HTTP.");
          start.disabled = false;
        });
      });

      save.addEventListener("click", function () {
        if (!emulator) {
          return;
        }
        setStatus("Saving state…");
        emulator.save_state().then(function (buf) {
          var blob = new Blob([buf], { type: "application/octet-stream" });
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "game_ready.state";
          a.rel = "noopener";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
          setStatus("Download started: game_ready.state — copy it to tools/vm-setup/images/");
        }).catch(function (err) {
          setStatus("save_state failed: " + (err && err.message ? err.message : String(err)));
        });
      });
    })();
  </script>
</body>

</html>
