<aside class="post-sidebar" id="post-toc">
  {{ if .TableOfContents }}
  <button id="toc-toggle" class="toc-toggle" aria-expanded="true" aria-controls="post-toc">
    <span class="sr-only">Toggle table of contents</span>
    <svg class="icon-toc" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <nav id="TableOfContentsNav" class="toc" aria-label="Table of contents">
    <details open class="toc-details">
      <summary>On this page</summary>
      {{ .TableOfContents }}
    </details>
  </nav>
  {{ end }}
</aside>
